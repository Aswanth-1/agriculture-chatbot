<svg xmlns="http://www.w3.org/2000/svg" width="1300" height="900" viewBox="0 0 1300 900" role="img" aria-labelledby="title desc">
  <title id="title">Agriculture Chatbot Low Level Message Flow</title>
  <desc id="desc">Sequence-style diagram showing a user message flowing from browser to server, command handler, data module, and back.</desc>
  <defs>
    <style>
      .bg { fill: #f6f4ec; }
      .title { font: 700 28px Arial, sans-serif; fill: #173428; }
      .subtitle { font: 400 14px Arial, sans-serif; fill: #5e6d63; }
      .head { fill: #ffffff; stroke: #28533f; stroke-width: 2; rx: 14; ry: 14; }
      .head-soft { fill: #edf5ef; stroke: #28533f; stroke-width: 2; rx: 14; ry: 14; }
      .head-warm { fill: #fbf4e3; stroke: #b78b49; stroke-width: 2; rx: 14; ry: 14; }
      .label { font: 700 16px Arial, sans-serif; fill: #18261d; text-anchor: middle; }
      .sub { font: 400 12px Arial, sans-serif; fill: #4f5d55; text-anchor: middle; }
      .life { stroke: #91a59a; stroke-width: 2; stroke-dasharray: 8 8; }
      .msg { stroke: #28533f; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
      .msg-text { font: 400 13px Arial, sans-serif; fill: #173428; }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#28533f" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1300" height="900" />
  <text class="title" x="60" y="55">Agriculture Chatbot - Message Flow</text>
  <text class="subtitle" x="60" y="82">Detailed path for a message sent from the website</text>

  <rect class="head" x="80" y="120" width="140" height="70" />
  <text class="label" x="150" y="155">User</text>

  <rect class="head" x="300" y="120" width="170" height="70" />
  <text class="label" x="385" y="155">Browser UI</text>
  <text class="sub" x="385" y="176">web/app.js</text>

  <rect class="head-soft" x="565" y="120" width="170" height="70" />
  <text class="label" x="650" y="155">web_app.py</text>
  <text class="sub" x="650" y="176">HTTP server</text>

  <rect class="head-soft" x="825" y="120" width="190" height="70" />
  <text class="label" x="920" y="155">command_handler.py</text>
  <text class="sub" x="920" y="176">reply generator</text>

  <rect class="head-warm" x="1090" y="120" width="150" height="70" />
  <text class="label" x="1165" y="155">Data Module</text>
  <text class="sub" x="1165" y="176">agriculture_data.py</text>

  <line class="life" x1="150" y1="190" x2="150" y2="820" />
  <line class="life" x1="385" y1="190" x2="385" y2="820" />
  <line class="life" x1="650" y1="190" x2="650" y2="820" />
  <line class="life" x1="920" y1="190" x2="920" y2="820" />
  <line class="life" x1="1165" y1="190" x2="1165" y2="820" />

  <path class="msg" d="M 150 245 L 385 245" />
  <text class="msg-text" x="220" y="232">1. Type question</text>

  <path class="msg" d="M 385 320 L 650 320" />
  <text class="msg-text" x="455" y="307">2. POST /api/chat</text>

  <path class="msg" d="M 650 395 L 920 395" />
  <text class="msg-text" x="712" y="382">3. get_bot_response(message, history)</text>

  <path class="msg" d="M 920 470 L 1165 470" />
  <text class="msg-text" x="996" y="457">4. Read matching agriculture data</text>

  <path class="msg" d="M 1165 545 L 920 545" />
  <text class="msg-text" x="980" y="532">5. Return selected content</text>

  <path class="msg" d="M 920 620 L 650 620" />
  <text class="msg-text" x="730" y="607">6. Return reply text</text>

  <path class="msg" d="M 650 695 L 385 695" />
  <text class="msg-text" x="458" y="682">7. JSON reply</text>

  <path class="msg" d="M 385 770 L 150 770" />
  <text class="msg-text" x="240" y="757">8. Show answer to user</text>
</svg>
